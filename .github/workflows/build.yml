name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v2

      # Auth for GitHub Packages (the ReVanced registry is not readable anonymously):
      #  - GITHUB_TOKEN (+ auto GITHUB_ACTOR) satisfies pluginManagement in
      #    settings.gradle.kts, resolving the app.revanced.patches plugin.
      #  - The plugin registers a separate credentialed repo for the patcher
      #    dependency that reads the githubPackagesUsername/Password Gradle
      #    properties, supplied here via ORG_GRADLE_PROJECT_* env vars.
      - name: Build patch bundle (.rvp)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew build --no-daemon

      # Guard: the signature-spoof extension dex must ship inside the .rvp
      # (it is bundled from patches/src/main/resources by the jar task, not built
      # from the extensions/ source module). Fail loudly if it ever stops shipping.
      - name: Verify extension is bundled
        run: |
          rvp=$(find patches/build/libs -name '*.rvp' ! -name '*sources*' ! -name '*javadoc*' | head -n1)
          if [ -z "$rvp" ]; then echo "No .rvp built" >&2; exit 1; fi
          unzip -l "$rvp" | grep -q 'dcinside/signature-spoof.rve' \
            || { echo "signature-spoof.rve missing from $rvp" >&2; exit 1; }
          echo "OK: signature-spoof.rve present in $(basename "$rvp")"

      - name: Upload .rvp artifact
        uses: actions/upload-artifact@v4
        with:
          name: patches
          path: |
            patches/build/libs/*.rvp
            !patches/build/libs/*sources*.rvp
            !patches/build/libs/*javadoc*.rvp
          if-no-files-found: error
